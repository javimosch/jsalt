<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSA Framework</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { background: #1a1a2e; min-height: 100vh; padding: 20px; font-family: system-ui; }
    nav { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
    nav button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; background: #3b82f6; color: white; }
    nav button:hover { background: #2563eb; }
    nav button.active { background: #1e40af; }
  </style>
</head>
<body>
  <nav>
    <button onclick="load('counter.jsa', this)">Counter</button>
    <button onclick="load('todo.jsa', this)">Todo</button>
  </nav>
  <div id="app"></div>
  <script type="module">
    import { load } from './jsa-runtime.js';
    window.load = (file, btn) => {
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      load(file, btn);
    };
    load('counter.jsa', document.querySelector('nav button'));
  </script>
</body>
</html>
