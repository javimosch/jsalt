<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JSA Framework - Examples</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { background: #1a1a2e; min-height: 100vh; padding: 20px; font-family: system-ui; }
    nav { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
    nav button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; background: #3b82f6; color: white; }
    nav button:hover { background: #2563eb; }
    nav button.active { background: #1e40af; }
    footer { text-align: center; color: #888; margin-top: 40px; font-size: 14px; }
  </style>
</head>
<body>
  <nav>
    <button onclick="load('counter.jsa', this)">Counter</button>
    <button onclick="load('calculator.jsa', this)">Calculator</button>
    <button onclick="load('kanban.jsa', this)">Kanban</button>
    <button onclick="load('store.jsa', this)">Todo</button>
    <button onclick="load('composable.jsa', this)">Composable</button>
  </nav>
  <div id="app"></div>
  <footer>
    JSA Framework Examples — <a href="https://github.com/jsalt/jsa" style="color:#3b82f6">GitHub</a>
  </footer>
  <script type="module">
    import { load } from '../jsa-runtime.js';
    window.load = (f, b) => {
      document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
      b?.classList.add('active');
      load(f, b || '#app');
    };
    load('counter.jsa', document.querySelector('nav button'));
  </script>
</body>
</html>
